<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Squirrel Eat Squirrel</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #6aa06b;
        font-family: Arial, sans-serif;
        color: #172113;
      }

      .shell {
        width: min(100vw, 1120px);
        padding: 14px;
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 10;
        border: 4px solid #203820;
        background: #9fcf78;
        box-shadow: 0 14px 36px rgba(15, 28, 14, 0.3);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <canvas id="game" width="960" height="600" aria-label="Squirrel Eat Squirrel game"></canvas>
    </main>
    <script type="module" src="./main.mjs"></script>
  </body>
</html>
