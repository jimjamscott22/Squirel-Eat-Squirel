<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Squirrel Eat Squirrel</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 25% 12%, rgba(255, 247, 219, 0.2), transparent 28rem),
          linear-gradient(145deg, #547d55, #7ba06a 54%, #4d724e);
        font-family: Arial, sans-serif;
        color: #172113;
      }

      .shell {
        width: min(100vw, 1120px);
        padding: 14px;
      }

      .character-picker {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 12px;
        padding: 10px;
        border: 3px solid #203820;
        background: rgba(255, 247, 219, 0.94);
        box-shadow: 0 10px 24px rgba(15, 28, 14, 0.22);
      }

      .picker-label {
        flex: 0 0 auto;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #203820;
      }

      .character-options {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        width: 100%;
      }

      .character-option {
        min-width: 0;
        border: 2px solid rgba(32, 56, 32, 0.48);
        border-radius: 8px;
        padding: 9px 10px;
        background: #fff7db;
        color: #172113;
        font: inherit;
        text-align: left;
        cursor: pointer;
        transition: background 140ms ease, border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
      }

      .character-option strong,
      .character-option span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .character-option strong {
        font-size: 15px;
      }

      .character-option span {
        margin-top: 2px;
        font-size: 12px;
        color: #4f5b38;
      }

      .character-option:hover {
        border-color: #9b5b2e;
        background: #ffe9b8;
        transform: translateY(-1px);
      }

      .character-option:focus-visible {
        outline: 3px solid #f2b84b;
        outline-offset: 2px;
      }

      .character-option.is-selected,
      .character-option[aria-pressed="true"] {
        border-color: #203820;
        background: #f4c36a;
        box-shadow: inset 0 0 0 2px rgba(255, 247, 219, 0.7);
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 10;
        border: 4px solid #203820;
        background: #9fcf78;
        box-shadow: 0 14px 36px rgba(15, 28, 14, 0.3);
      }

      @media (max-width: 680px) {
        .shell {
          padding: 8px;
        }

        .character-picker {
          align-items: stretch;
          flex-direction: column;
          gap: 8px;
        }

        .character-options {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="character-picker" aria-label="Choose your character">
        <div class="picker-label">Character</div>
        <div class="character-options">
          <button class="character-option is-selected" type="button" data-character="squirrel" aria-pressed="true">
            <strong>Squirrel</strong>
            <span>Bushy tail climber</span>
          </button>
          <button class="character-option" type="button" data-character="chipmunk" aria-pressed="false">
            <strong>Chipmunk</strong>
            <span>Striped forest scout</span>
          </button>
          <button class="character-option" type="button" data-character="fox" aria-pressed="false">
            <strong>Fox</strong>
            <span>Sharp-eared runner</span>
          </button>
        </div>
      </section>
      <canvas id="game" width="960" height="600" aria-label="Squirrel Eat Squirrel game"></canvas>
    </main>
    <script type="module" src="./main.mjs"></script>
  </body>
</html>
